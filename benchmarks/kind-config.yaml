# Kind cluster configuration for Bulkhead E2E benchmarks.
# Creates a 3-node cluster with NodePort mappings for the 3 consolidated binaries.
#
# Service port mapping:
#   control-plane  : host 50060 -> NodePort 30060  (Identity, Task, Workspace, Compute)
#   policy         : host 50062 -> NodePort 30062  (Guardrails, Governance)
#   observability  : host 50065 -> NodePort 30065  (Activity, Economics, Human)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  # control-plane (Identity, Task, Workspace, Compute)
  - containerPort: 30060
    hostPort: 50060
    protocol: TCP
  # policy (Guardrails, Governance)
  - containerPort: 30062
    hostPort: 50062
    protocol: TCP
  # observability (Activity, Economics, Human)
  - containerPort: 30065
    hostPort: 50065
    protocol: TCP
- role: worker
- role: worker
