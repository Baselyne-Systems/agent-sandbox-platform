name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
        working-directory: proto

  go-lint:
    name: Go Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: control-plane/go.sum
      - uses: bufbuild/buf-setup-action@v1
      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Generate proto stubs
        run: buf generate
        working-directory: proto
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi
        working-directory: control-plane
      - name: Vet
        run: go vet ./...
        working-directory: control-plane

  go-build-test:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: control-plane/go.sum
      - uses: bufbuild/buf-setup-action@v1
      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Generate proto stubs
        run: buf generate
        working-directory: proto
      - name: Build
        run: go build ./...
        working-directory: control-plane
      - name: Test with coverage
        run: |
          # Measure coverage for service packages only (exclude generated proto,
          # cmd/ entrypoints, and infra bootstrapping with no unit tests).
          # Include e2e tests in the run since they cover handlers and cross-service paths.
          COVERPKGS=$(go list ./internal/... | grep -vE '/(config|database|telemetry|testutil|models)$' | paste -sd, -)
          go test -count=1 -short -coverprofile=coverage.out -covermode=atomic -coverpkg="$COVERPKGS" ./internal/... ./e2e/...
        working-directory: control-plane
      - name: Compute coverage percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"
          # Pick badge color based on coverage
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR=brightgreen
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR=yellow
          else COLOR=red; fi
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
        working-directory: control-plane
      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: f31293e684419d918138980929f0288c
          filename: bulkhead-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          color: ${{ steps.coverage.outputs.color }}

  rust-lint:
    name: Rust Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check formatting
        run: cargo fmt --check
        working-directory: runtime
      - name: Clippy
        run: cargo clippy -- -D warnings -A clippy::too_many_arguments
        working-directory: runtime

  rust-build-test:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build
        run: cargo build
        working-directory: runtime
      - name: Test
        run: cargo test
        working-directory: runtime

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check syntax
        run: |
          python -m py_compile bulkhead/__init__.py
          python -m py_compile bulkhead/client.py
          python -m py_compile bulkhead/decorators.py
          python -m py_compile bulkhead/types.py
          python -m py_compile bulkhead/mcp.py
          python -m py_compile bulkhead/langchain.py
        working-directory: sdk/python

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint deploy/helm/bulkhead/
