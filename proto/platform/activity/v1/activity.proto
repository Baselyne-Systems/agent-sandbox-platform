syntax = "proto3";

package platform.activity.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// ActivityService provides an append-only store for all agent actions.
service ActivityService {
  // RecordAction appends an action record to the activity store.
  rpc RecordAction(RecordActionRequest) returns (RecordActionResponse);

  // GetAction retrieves a single action record.
  rpc GetAction(GetActionRequest) returns (GetActionResponse);

  // QueryActions returns action records matching the given filter.
  rpc QueryActions(QueryActionsRequest) returns (QueryActionsResponse);

  // StreamActions returns a live stream of action records.
  rpc StreamActions(StreamActionsRequest) returns (stream ActionRecord);

  // ConfigureAlert creates or updates an alert configuration.
  rpc ConfigureAlert(ConfigureAlertRequest) returns (ConfigureAlertResponse);

  // ListAlerts returns alerts matching the given filter.
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);

  // GetAlert retrieves a single alert by ID.
  rpc GetAlert(GetAlertRequest) returns (GetAlertResponse);

  // ResolveAlert marks an active alert as resolved.
  rpc ResolveAlert(ResolveAlertRequest) returns (ResolveAlertResponse);
}

// ActionRecord is an immutable record of a single agent action.
message ActionRecord {
  string record_id = 1;
  string workspace_id = 2;
  string agent_id = 3;
  string task_id = 4;
  string tool_name = 5;
  google.protobuf.Struct parameters = 6;
  google.protobuf.Struct result = 7;
  ActionOutcome outcome = 8;
  string guardrail_rule_id = 9;
  string denial_reason = 10;
  int64 evaluation_latency_us = 11;
  int64 execution_latency_us = 12;
  google.protobuf.Timestamp recorded_at = 13;
  string tenant_id = 14;
}

enum ActionOutcome {
  ACTION_OUTCOME_UNSPECIFIED = 0;
  ACTION_OUTCOME_ALLOWED = 1;
  ACTION_OUTCOME_DENIED = 2;
  ACTION_OUTCOME_ESCALATED = 3;
  ACTION_OUTCOME_ERROR = 4;
}

message RecordActionRequest {
  ActionRecord record = 1;
}

message RecordActionResponse {
  string record_id = 1;
}

message GetActionRequest {
  string record_id = 1;
}

message GetActionResponse {
  ActionRecord record = 1;
}

message QueryActionsRequest {
  string workspace_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string tool_name = 4;
  ActionOutcome outcome = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  int32 page_size = 8;
  string page_token = 9;
}

message QueryActionsResponse {
  repeated ActionRecord records = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message StreamActionsRequest {
  string workspace_id = 1;
  string agent_id = 2;
}

// --- Alert Configuration ---

enum AlertConditionType {
  ALERT_CONDITION_TYPE_UNSPECIFIED = 0;
  ALERT_CONDITION_TYPE_DENIAL_RATE = 1;
  ALERT_CONDITION_TYPE_ERROR_RATE = 2;
  ALERT_CONDITION_TYPE_ACTION_VELOCITY = 3;
  ALERT_CONDITION_TYPE_BUDGET_BREACH = 4;
  ALERT_CONDITION_TYPE_STUCK_AGENT = 5;
}

message AlertConfig {
  string config_id = 1;
  string name = 2;
  AlertConditionType condition_type = 3;
  double threshold = 4;
  string agent_id = 5;  // optional scope — empty means all agents
  bool enabled = 6;
  string webhook_url = 7;
  google.protobuf.Timestamp created_at = 8;
}

message Alert {
  string alert_id = 1;
  string config_id = 2;
  string agent_id = 3;
  AlertConditionType condition_type = 4;
  string message = 5;
  google.protobuf.Timestamp triggered_at = 6;
  bool resolved = 7;
}

message ConfigureAlertRequest {
  string name = 1;
  AlertConditionType condition_type = 2;
  double threshold = 3;
  string agent_id = 4;
  string webhook_url = 5;
}

message ConfigureAlertResponse {
  AlertConfig config = 1;
}

message ListAlertsRequest {
  string agent_id = 1;
  bool active_only = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListAlertsResponse {
  repeated Alert alerts = 1;
  string next_page_token = 2;
}

message GetAlertRequest {
  string alert_id = 1;
}

message GetAlertResponse {
  Alert alert = 1;
}

message ResolveAlertRequest {
  string alert_id = 1;
}

message ResolveAlertResponse {}
