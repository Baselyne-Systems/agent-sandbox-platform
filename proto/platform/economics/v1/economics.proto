syntax = "proto3";

package platform.economics.v1;

import "google/protobuf/timestamp.proto";

// EconomicsService handles metering, budget enforcement, and cost tracking.
service EconomicsService {
  rpc RecordUsage(RecordUsageRequest) returns (RecordUsageResponse);
  rpc GetBudget(GetBudgetRequest) returns (GetBudgetResponse);
  rpc SetBudget(SetBudgetRequest) returns (SetBudgetResponse);
  rpc CheckBudget(CheckBudgetRequest) returns (CheckBudgetResponse);
}

message UsageRecord {
  string record_id = 1;
  string agent_id = 2;
  string workspace_id = 3;
  string resource_type = 4;
  double quantity = 5;
  string unit = 6;
  double cost = 7;
  google.protobuf.Timestamp recorded_at = 8;
}

message Budget {
  string budget_id = 1;
  string agent_id = 2;
  double limit = 3;
  double used = 4;
  string currency = 5;
  google.protobuf.Timestamp period_start = 6;
  google.protobuf.Timestamp period_end = 7;
}

message RecordUsageRequest {
  UsageRecord record = 1;
}

message RecordUsageResponse {
  string record_id = 1;
}

message GetBudgetRequest {
  string agent_id = 1;
}

message GetBudgetResponse {
  Budget budget = 1;
}

message SetBudgetRequest {
  string agent_id = 1;
  double limit = 2;
  string currency = 3;
}

message SetBudgetResponse {
  Budget budget = 1;
}

message CheckBudgetRequest {
  string agent_id = 1;
  double estimated_cost = 2;
}

message CheckBudgetResponse {
  bool allowed = 1;
  double remaining = 2;
}
