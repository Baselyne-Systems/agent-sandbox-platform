syntax = "proto3";

package platform.economics.v1;

import "google/protobuf/timestamp.proto";

// EconomicsService handles metering, budget enforcement, and cost tracking.
service EconomicsService {
  rpc RecordUsage(RecordUsageRequest) returns (RecordUsageResponse);
  rpc GetBudget(GetBudgetRequest) returns (GetBudgetResponse);
  rpc SetBudget(SetBudgetRequest) returns (SetBudgetResponse);
  rpc CheckBudget(CheckBudgetRequest) returns (CheckBudgetResponse);
  rpc GetCostReport(GetCostReportRequest) returns (GetCostReportResponse);
}

message UsageRecord {
  string record_id = 1;
  string agent_id = 2;
  string workspace_id = 3;
  string resource_type = 4;
  double quantity = 5;
  string unit = 6;
  double cost = 7;
  google.protobuf.Timestamp recorded_at = 8;
}

// OnExceededAction determines what happens when a budget is exhausted.
enum OnExceededAction {
  ON_EXCEEDED_ACTION_UNSPECIFIED = 0;
  ON_EXCEEDED_ACTION_HALT = 1;             // Hard stop — deny all further tool calls
  ON_EXCEEDED_ACTION_REQUEST_INCREASE = 2; // Escalate to human for budget increase
  ON_EXCEEDED_ACTION_WARN = 3;             // Allow but flag with warning
}

message Budget {
  string budget_id = 1;
  string agent_id = 2;
  double limit = 3;
  double used = 4;
  string currency = 5;
  google.protobuf.Timestamp period_start = 6;
  google.protobuf.Timestamp period_end = 7;
  OnExceededAction on_exceeded = 8;   // What to do when budget is exhausted
  double warning_threshold = 9;       // 0.0–1.0: fraction of limit that triggers a warning
}

message RecordUsageRequest {
  UsageRecord record = 1;
}

message RecordUsageResponse {
  string record_id = 1;
}

message GetBudgetRequest {
  string agent_id = 1;
}

message GetBudgetResponse {
  Budget budget = 1;
}

message SetBudgetRequest {
  string agent_id = 1;
  double limit = 2;
  string currency = 3;
  OnExceededAction on_exceeded = 4;   // What to do when budget is exhausted
  double warning_threshold = 5;       // 0.0–1.0: fraction of limit that triggers a warning
}

message SetBudgetResponse {
  Budget budget = 1;
}

message CheckBudgetRequest {
  string agent_id = 1;
  double estimated_cost = 2;
}

message CheckBudgetResponse {
  bool allowed = 1;
  double remaining = 2;
  string enforcement_action = 3; // "halt", "request_increase", or "" (when allowed)
  bool warning = 4;              // true when remaining < warning_threshold * limit
}

message GetCostReportRequest {
  string agent_id = 1; // optional — empty = all agents
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
}

message GetCostReportResponse {
  double total_cost = 1;
  int32 record_count = 2;
  repeated CostBreakdown by_resource_type = 3;
}

message CostBreakdown {
  string resource_type = 1;
  double total_cost = 2;
  int32 record_count = 3;
}
