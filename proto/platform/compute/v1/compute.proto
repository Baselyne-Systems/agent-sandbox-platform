syntax = "proto3";

package platform.compute.v1;

import "google/protobuf/timestamp.proto";

// ComputePlaneService manages the host fleet and workspace placement.
service ComputePlaneService {
  rpc RegisterHost(RegisterHostRequest) returns (RegisterHostResponse);
  rpc DeregisterHost(DeregisterHostRequest) returns (DeregisterHostResponse);
  rpc ListHosts(ListHostsRequest) returns (ListHostsResponse);
  rpc PlaceWorkspace(PlaceWorkspaceRequest) returns (PlaceWorkspaceResponse);

  // Heartbeat reports host liveness and current resource availability.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message Host {
  string host_id = 1;
  string address = 2;
  HostStatus status = 3;
  HostResources total_resources = 4;
  HostResources available_resources = 5;
  int32 active_sandboxes = 6;
  google.protobuf.Timestamp last_heartbeat = 7;
}

enum HostStatus {
  HOST_STATUS_UNSPECIFIED = 0;
  HOST_STATUS_READY = 1;
  HOST_STATUS_DRAINING = 2;
  HOST_STATUS_OFFLINE = 3;
}

message HostResources {
  int64 memory_mb = 1;
  int32 cpu_millicores = 2;
  int64 disk_mb = 3;
}

message RegisterHostRequest {
  string address = 1;
  HostResources total_resources = 2;
}

message RegisterHostResponse {
  Host host = 1;
}

message DeregisterHostRequest {
  string host_id = 1;
}

message DeregisterHostResponse {}

message ListHostsRequest {
  HostStatus status = 1;
}

message ListHostsResponse {
  repeated Host hosts = 1;
}

message PlaceWorkspaceRequest {
  int64 memory_mb = 1;
  int32 cpu_millicores = 2;
  int64 disk_mb = 3;
}

message PlaceWorkspaceResponse {
  string host_id = 1;
  string runtime_endpoint = 2;
}

message HeartbeatRequest {
  string host_id = 1;
  int64 available_memory_mb = 2;
  int32 available_cpu_millicores = 3;
  int64 available_disk_mb = 4;
  int32 active_sandboxes = 5;
}

message HeartbeatResponse {
  HostStatus status = 1;
}
