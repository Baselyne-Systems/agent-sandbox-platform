version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/Baselyne-Systems/bulkhead/control-plane/pkg/gen
plugins:
  # Go
  - local: protoc-gen-go
    out: ../control-plane/pkg/gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../control-plane/pkg/gen
    opt: paths=source_relative
