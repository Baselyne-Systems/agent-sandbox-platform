version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/baselyne/agent-sandbox-platform/control-plane/pkg/gen
plugins:
  # Go
  - remote: buf.build/protocolbuffers/go
    out: ../control-plane/pkg/gen
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: ../control-plane/pkg/gen
    opt: paths=source_relative
