x-go-service: &go-service
  build:
    context: ..
    dockerfile: deploy/docker/Dockerfile.control-plane
  environment: &go-env
    DATABASE_URL: postgres://postgres:postgres@postgres:5432/sandbox?sslmode=disable
    GRPC_PORT: "50051"
    LOG_LEVEL: info
    OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
  depends_on:
    postgres:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "grpc_health_probe", "-addr=:50051"]
    interval: 10s
    timeout: 5s
    retries: 5
  networks:
    - bulkhead

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sandbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../control-plane/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bulkhead

  control-plane:
    <<: *go-service
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.control-plane
      args:
        SERVICE: control-plane
    environment:
      <<: *go-env
      GUARDRAILS_ENDPOINT: policy:50051
    ports:
      - "50060:50051"
    depends_on:
      postgres:
        condition: service_healthy
      policy:
        condition: service_healthy

  policy:
    <<: *go-service
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.control-plane
      args:
        SERVICE: policy
    ports:
      - "50062:50051"

  observability:
    <<: *go-service
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.control-plane
      args:
        SERVICE: observability
    ports:
      - "50065:50051"

  host-agent:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.host-agent
    environment:
      GRPC_PORT: "50052"
      ADVERTISE_ADDRESS: host-agent
      HIS_ENDPOINT: http://observability:50051
      ACTIVITY_ENDPOINT: http://observability:50051
      ECONOMICS_ENDPOINT: http://observability:50051
      GOVERNANCE_ENDPOINT: http://policy:50051
      COMPUTE_ENDPOINT: http://control-plane:50051
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      TOTAL_MEMORY_MB: "16384"
      TOTAL_CPU_MILLICORES: "8000"
      TOTAL_DISK_MB: "102400"
      ENABLE_DOCKER: "true"
      RUST_LOG: info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "50052:50052"
    depends_on:
      control-plane:
        condition: service_healthy
      policy:
        condition: service_healthy
      observability:
        condition: service_healthy
    networks:
      - bulkhead

  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - bulkhead

volumes:
  pgdata:

networks:
  bulkhead:
    driver: bridge
