{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bulkhead.fullname" . }}-postgres-ingress
  labels:
    {{- include "bulkhead.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "bulkhead.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "bulkhead.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bulkhead.fullname" . }}-control-plane-ingress
  labels:
    {{- include "bulkhead.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "bulkhead.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "bulkhead.selectorLabels" . | nindent 14 }}
      ports:
        - port: 50051
        - port: {{ .Values.hostAgent.port }}
{{- end }}
